name: Update project stats

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count stats
        run: |
          LOC=$(find . \( -name '*.js' -o -name '*.ts' -o -name '*.jsx' -o -name '*.tsx' -o -name '*.mjs' \) | grep -v node_modules | grep -v '.next' | grep -v dist | grep -v '.min.' | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          TESTS=$(find . \( -name '*.test.*' -o -name '*.spec.*' \) | grep -v node_modules | xargs grep -c 'it(\|test(' 2>/dev/null | awk -F: '{s+=$2} END {print s+0}')
          TEST_FILES=$(find . \( -name '*.test.*' -o -name '*.spec.*' \) | grep -v node_modules | wc -l | awk '{print $1}')
          COMMITS=$(git rev-list --count HEAD)
          CONTRIBUTORS=$(git shortlog -sn HEAD | wc -l | awk '{print $1}')
          FIRST_COMMIT=$(git log --reverse --format=%ad --date=short HEAD | head -1)

          cat > stats.json << INNER
          {
            "loc": $LOC,
            "tests": $TESTS,
            "testFiles": $TEST_FILES,
            "commits": $COMMITS,
            "contributors": $CONTRIBUTORS,
            "firstCommit": "$FIRST_COMMIT",
            "updatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          INNER

          sed -i 's/^          //' stats.json
          cat stats.json

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: update project stats [skip ci]" && git push)
